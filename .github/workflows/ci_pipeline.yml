name: CI ML Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      # 3. Check Environment
      - name: Check Env
        run: python --version

      # 4. Install Dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      # 5. Run MLflow Project
      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . -e main --env-manager=local

      # 6. Get latest MLflow run_id
      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/* | head -1 | awk -F/ '{print $3}')
          echo "run_id=$RUN_ID" >> $GITHUB_ENV
          echo "Tautan ke Docker Hub: https://hub.docker.com/u/${{ secrets.DOCKERHUB_USERNAME }}" > MLProject/Tautan_ke_Docker_Hub.txt

      # 7. Login ke Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Build & Push Docker Model
      - name: Build and Push Docker Model
        run: |
          # Menggunakan fitur bawaan mlflow build-docker
          mlflow models build-docker -m mlruns/0/${{ env.run_id }}/artifacts/model -n ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-scoring-model:latest

      # 9. Upload Tautan ke GitHub 
      - name: Upload Link to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/Tautan_ke_Docker_Hub.txt

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "docs: tambahkan tautan Docker Hub"
            git push origin main
          fi
